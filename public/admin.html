<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <div id="dashboardScreen" class="hidden w-full max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Visitor</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Contact</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Visiting</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Purpose</th>
                        <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Entry Time</th>
                        <th class="px-6 py-4 text-right text-xs font-semibold text-gray-500 uppercase">Action</th>
                    </tr>
                    </thead>
                    <tbody id="tableBody" class="bg-white divide-y divide-gray-200"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
<div class="bg-white p-8 rounded-lg shadow-md w-96">
    <input type="password" id="passwordInput" placeholder="Enter password"
           class="w-full border p-2 rounded mb-4"/>
    <button onclick="checkPassword()"
            class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">
        Submit
    </button>
</div>
</body>
</html>
