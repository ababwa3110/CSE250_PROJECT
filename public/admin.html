<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-800">

<div id="loginScreen" class="flex items-center justify-center min-h-screen px-4">
    <div class="bg-white p-8 rounded-2xl shadow-lg max-w-sm w-full">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Security Login</h2>
        <div id="loginError" class="hidden bg-red-50 text-red-600 p-3 rounded mb-4 text-sm text-center"></div>
        <form onsubmit="handleLogin(event)" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Admin Password</label>
                <input type="password" id="passwordInput" placeholder="Enter password" required autofocus
                       class="w-full px-4 py-3 rounded-lg border border-gray-300 outline-none">
            </div>
            <button type="submit" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-4 rounded-lg">
                Access Dashboard
            </button>
        </form>
    </div>
</div>

<div id="dashboardScreen" class="hidden w-full max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Visitor</th>
                    <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Contact</th>
                    <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Visiting</th>
                    <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Purpose</th>
                    <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Entry Time</th>
                    <th class="px-6 py-4 text-right text-xs font-semibold text-gray-500 uppercase">Action</th>
                </tr>
                </thead>
                <tbody id="tableBody" class="bg-white divide-y divide-gray-200"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let adminPassword = "";
    let autoRefreshInterval = null;

    function formatTime(timeString) {
        if (!timeString) return '';
        const date = new Date(timeString);
        return date.toLocaleString('en-IN', {
            day: '2-digit', month: 'short',
            hour: 'numeric', minute: '2-digit', hour12: true
        });
    }

    async function handleLogin(e) {
        e.preventDefault();
        const input = document.getElementById('passwordInput');
        const errorDiv = document.getElementById('loginError');
        adminPassword = input.value;
        const success = await load(true);
        if (success) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.remove('hidden');
            if (!autoRefreshInterval) {
                autoRefreshInterval = setInterval(() => load(false), 10000);
            }
        } else {
            errorDiv.textContent = "Invalid Password";
            errorDiv.classList.remove('hidden');
            input.value = "";
        }
    }

    async function load(isLoginAttempt = false) {
        try {
            const res = await fetch('/api/visitors', {
                headers: { 'admin-password': adminPassword }
            });
            if (res.status === 401) return false;
            const data = await res.json();
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            data.forEach(v => {
                tbody.innerHTML += `<tr>
                    <td class="px-6 py-4 text-sm font-bold text-gray-900">${v.name}</td>
                    <td class="px-6 py-4 text-sm text-gray-600">${v.phone}</td>
                    <td class="px-6 py-4 text-sm text-gray-900">${v.host_name}</td>
                    <td class="px-6 py-4 text-sm text-gray-600">${v.purpose}</td>
                    <td class="px-6 py-4 text-sm text-gray-600">${formatTime(v.entry_time)}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <button onclick="signOut(${v.id})" class="bg-red-50 text-red-600 hover:bg-red-100 font-medium py-1.5 px-4 rounded-md border border-red-200 text-sm">Sign Out</button>
                    </td>
                </tr>`;
            });
            return true;
        } catch (err) {
            return false;
        }
    }

    async function signOut(id) {
        if(!confirm("Mark this visitor as signed out?")) return;
        try {
            await fetch(`/api/exit/${id}`, { method: 'PUT' });
            load(false);
        } catch (e) {
            alert("Error connecting to server to sign out.");
        }
    }
</script>
</body>
</html>
