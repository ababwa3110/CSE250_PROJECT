<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Check-in</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex items-center justify-center p-4">
<div id="successContainer" class="hidden bg-white p-10 rounded-2xl shadow-xl max-w-md w-full text-center border border-gray-100">
    <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg class="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
    </div>
    <h2 class="text-2xl font-bold text-gray-800 mb-3">Registration Complete</h2>
    <p class="text-gray-600 mb-8">Thank you. Your details have been sent to security. You may now proceed inside.</p>
</div>
<div class="bg-white shadow-xl rounded-2xl w-full max-w-md p-8">

    <div class="text-center mb-8">
        <h2 class="text-3xl font-extrabold text-gray-900">Welcome</h2>
        <p class="text-gray-500">Please enter your details to check-in</p>
    </div>

    <form id="logForm" action="#" method="POST" class="space-y-5">

        <div>
            <label for="name" class="block text-sm font-semibold text-gray-700 mb-1">Full Name</label>
            <input type="text" id="name" name="name" placeholder="John Doe" required
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all">
        </div>

        <div>
            <label for="phone" class="block text-sm font-semibold text-gray-700 mb-1">Phone Number</label>
            <input type="tel" id="phone" name="phone"
                   placeholder="1234567890"
                   required
                   maxlength="10"
                   pattern="[0-9]{10}"
                   oninput="this.value = this.value.replace(/[^0-9]/g, '');"
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all">
            <p class="text-xs text-gray-400 mt-1">10-digit mobile number only.</p>
        </div>

        <div>
            <label for="host" class="block text-sm font-semibold text-gray-700 mb-1">Host Name</label>
            <input type="text" id="host" name="host" placeholder="Who are you meeting?" required
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all">
        </div>

        <div>
            <label for="purpose" class="block text-sm font-semibold text-gray-700 mb-1">Purpose of Visit</label>
            <select id="purpose" name="purpose" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all">
                <option value="" disabled selected>Select a reason</option>
                <option value="interview">Interview</option>
                <option value="meeting">Business Meeting</option>
                <option value="delivery">Delivery</option>
                <option value="other">Other</option>
            </select>
        </div>

        <div class="pt-4">
            <button type="submit" id="submit-btn"
                    class="w-full bg-green-600 text-white py-3 rounded-lg font-bold text-lg shadow-lg hover:bg-green-700 hover:shadow-xl transform active:scale-95 transition-all duration-200">
                Check-in
            </button>
        </div>

    </form>

    <div class="mt-6 text-center">
        <a href="admin.html" class="text-sm text-gray-400 hover:text-blue-500 transition-colors">Admin Portal</a>
    </div>
</div>

<div id="geo-error" class="hidden fixed top-5 left-1/2 transform -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-full shadow-2xl z-50 whitespace-nowrap">
    🚫 Access Denied: You must be on-site to check-in.
</div>

<script>
    // --- Day 4: Geofencing Logic ---
    const officeCoords = { lat: 23.0225, lng: 72.5714 };
    const maxDistance = 0.5; // roughly 500 meters

    function checkLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const userLat = position.coords.latitude;
                    const userLng = position.coords.longitude;

                    const dist = Math.sqrt(Math.pow(userLat - officeCoords.lat, 2) + Math.pow(userLng - officeCoords.lng, 2));

                    if (dist > maxDistance) {
                        document.getElementById('geo-error').classList.remove('hidden');
                        const btn = document.getElementById('submit-btn');
                        btn.disabled = true;
                        btn.classList.add('opacity-50', 'cursor-not-allowed');
                        btn.classList.remove('hover:bg-green-700', 'hover:shadow-xl', 'active:scale-95');
                    }
                },
                (error) => {
                    console.warn("Geolocation error:", error.message);
                }
            );
        }
    }

    window.onload = checkLocation;

    // --- Day 5: Form Submission & API Fetch Logic ---
    const logForm = document.getElementById('logForm');

    logForm.addEventListener('submit', async function(e) {
        // Task 1: Prevent default reload
        e.preventDefault();

        // Gather data from inputs
        const checkInData = {
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            host: document.getElementById('host').value,
            purpose: document.getElementById('purpose').value
        };

        // Task 2: POST to backend
        try {
            const response = await fetch('/api/visit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(checkInData)
            });

            if (response.ok) {
                console.log("Success: Check-in data saved to the database!");
                // Note: You will add the UI success screen logic on Day 6
            } else {
                console.error("Error: Server rejected the submission.");
            }
        } catch (error) {
            console.error("Network Error: Could not reach the backend.", error);
        }
    });
</script>
</body>
</html>
