<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Check-in</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex items-center justify-center p-4">

<div class="bg-white shadow-xl rounded-2xl w-full max-w-md p-8">

    <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-gray-900">Welcome</h1>
        <p class="text-gray-500">Please enter your details to check-in</p>
    </div>

    <form action="#" method="POST" class="space-y-5">

        <div>
            <label for="name" class="block text-sm font-semibold text-gray-700 mb-1">Full Name</label>
            <input type="text" id="name" name="name" placeholder="John Doe" required
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all">
        </div>

        <div>
            <label for="phone" class="block text-sm font-semibold text-gray-700 mb-1">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210" required
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all">
        </div>

        <div>
            <label for="host" class="block text-sm font-semibold text-gray-700 mb-1">Host Name</label>
            <input type="text" id="host" name="host" placeholder="Who are you meeting?" required
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all">
        </div>

        <div>
            <label for="purpose" class="block text-sm font-semibold text-gray-700 mb-1">Purpose of Visit</label>
            <select id="purpose" name="purpose" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition-all">
                <option value="" disabled selected>Select a reason</option>
                <option value="interview">Interview</option>
                <option value="meeting">Business Meeting</option>
                <option value="delivery">Delivery</option>
                <option value="other">Other</option>
            </select>
        </div>

        <div class="pt-4">
            <button type="submit"
                    class="w-full bg-green-600 text-white py-3 rounded-lg font-bold text-lg shadow-lg hover:bg-green-700 hover:shadow-xl transform active:scale-95 transition-all duration-200">
                Check-in
            </button>
        </div>

    </form>

    <div class="mt-6 text-center">
        <a href="admin.html" class="text-sm text-gray-400 hover:text-blue-500 transition-colors">Admin Portal</a>
    </div>
</div>

</body>
</html>
